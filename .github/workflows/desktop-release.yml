name: Build desktop downloads

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to receive the downloads
        required: true
        default: v4

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            label: Windows
            files: dist/*.exe
          - os: macos-14
            target: mac
            label: macOS
            files: dist/*.dmg
          - os: ubuntu-22.04
            target: linux
            label: Linux
            files: dist/*.AppImage

    steps:
      - name: Check out app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install packaging dependencies
        run: npm install --no-audit --no-fund

      - name: Build desktop package
        run: npm run dist:${{ matrix.target }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Store package for release job
        uses: actions/upload-artifact@v4
        with:
          name: echoes-${{ matrix.target }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Attach downloads to ${{ inputs.release_tag }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Collect desktop packages
        uses: actions/download-artifact@v4
        with:
          pattern: echoes-*
          path: release-assets
          merge-multiple: true

      - name: Upload packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release-assets/*
          fail_on_unmatched_files: true
